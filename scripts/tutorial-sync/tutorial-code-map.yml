# Maps platform-tutorials source files to inline code blocks in docs.
#
# source:   path relative to platform-tutorials root
# doc:      path relative to docs/tutorials/
# block_id: how to locate the code block in the markdown:
#   caption: match :caption: value in {code-block} directives
#   sync:    match :sync: value in tab-items (use with language filter)
#   tab:     match tab-item title text (use with language filter)
# language:  fenced block language (default: javascript)

docs_root: docs/tutorials

mappings:
  # -- Top-level tutorials --

  - source: connect.mjs
    doc: connecting-to-testnet.md
    block_id:
      caption: connect.mjs

  - source: create-wallet.mjs
    doc: create-and-fund-a-wallet.md
    block_id:
      caption: create-wallet.mjs

  - source: send-funds.mjs
